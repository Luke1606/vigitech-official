services:
  test-db:
    image: ankane/pgvector:latest
    container_name: radar-test-db
    environment:
      POSTGRES_DB: "${TEST_DB_NAME}"
      POSTGRES_USER: "${TEST_DB_USER}"
      POSTGRES_PASSWORD: "${TEST_DB_PASSWORD}"
    ports:
      - "5433:5432"
    volumes:
      - ./docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/
    networks:
      - test-network

networks:
  test-network: